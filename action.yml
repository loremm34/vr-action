name: "Visual Regression Check"
description: "Run visual regression tests against your site and get PR comments with diff screenshots"

branding:
  icon: "camera"
  color: "blue"

inputs:
  api-key:
    description: "VR API key (Settings → API Keys in the dashboard)"
    required: true
  project-id:
    description: "VR project ID (UUID from the dashboard)"
    required: true
  site-url:
    description: "Production URL of your site (e.g. https://my-app.com)"
    required: true
  preview-url:
    description: |
      Explicit preview URL to test against for pull requests.
      Use this if your platform does not register GitHub Deployments automatically
      (e.g. custom CI, AWS, self-hosted). When provided, auto-detect is skipped.
    required: false
    default: ""
  auto-detect-preview:
    description: |
      Automatically find the PR preview URL via the GitHub Deployments API.
      Works out of the box with Vercel, Netlify, Render — any platform that registers
      deployments to GitHub. Set to "false" to always test against site-url.
    required: false
    default: "true"
  preview-environment:
    description: |
      GitHub Deployment environment name to look for when auto-detecting the preview URL.
      Default "Preview" works for Vercel and Netlify. Change if your platform uses
      a different name (e.g. "preview", "staging", "pr-preview").
    required: false
    default: "Preview"
  preview-bypass-secret:
    description: |
      Secret token to bypass preview deployment authentication.
      Vercel: enable "Protection Bypass for Automation" in Project → Settings → Deployment Protection,
      copy the secret, add it as a repo secret, and pass it here. It will be appended as
      ?x-vercel-protection-bypass=SECRET to the preview URL.
      Other platforms: leave empty (most don't restrict preview access by default).
    required: false
    default: ""
  backend-url:
    description: "Visual regression backend URL"
    required: false
    default: "https://web-production-52de4.up.railway.app"
  suite:
    description: "Test suite name (used for grouping results in the dashboard)"
    required: false
    default: "website"
  pages:
    description: |
      JSON array of pages to test. Example:
      [{"name": "Home", "path": "/"}, {"name": "Login", "path": "/login", "wait_ms": 200}]
      Each page: name (string), path (string), key (optional), wait_ms (optional), threshold (optional).
    required: false
    default: ""
  config-file:
    description: "Path to a JSON config file in your repo (alternative to inline pages input)"
    required: false
    default: ""
  threshold:
    description: "Allowed pixel difference ratio (0.0–1.0). Default: 0.1 (10%)"
    required: false
    default: "0.1"
  detect-noise:
    description: "Auto-ignore animated regions like spinners and cursors. Default: true"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Resolve preview URL (PR only)
      id: resolve-url
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        SITE_URL="${{ inputs.site-url }}"

        if [ "${{ github.event_name }}" = "pull_request" ]; then

          # Priority 1: explicit preview-url provided by the client
          if [ -n "${{ inputs.preview-url }}" ]; then
            SITE_URL="${{ inputs.preview-url }}"
            if [ -n "${{ inputs.preview-bypass-secret }}" ]; then
              SITE_URL="${SITE_URL}?x-vercel-protection-bypass=${{ inputs.preview-bypass-secret }}"
              echo "Bypass secret applied to explicit preview URL"
            fi
            echo "Using explicit preview URL: $SITE_URL"

          # Priority 2: auto-detect via GitHub Deployments API
          elif [ "${{ inputs.auto-detect-preview }}" = "true" ]; then
            SHA="${{ github.event.pull_request.head.sha }}"
            ENV="${{ inputs.preview-environment }}"
            echo "PR detected — looking for '$ENV' deployment for SHA ${SHA:0:7}..."
            PREVIEW_URL=""
            for i in $(seq 1 30); do
              DEPLOY_ID=$(curl -sf \
                -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/deployments?sha=$SHA&environment=$ENV" \
                | python3 -c "
        import json,sys
        deps = json.load(sys.stdin)
        if deps: print(deps[0]['id'])
        " 2>/dev/null || true)
              if [ -n "$DEPLOY_ID" ]; then
                PREVIEW_URL=$(curl -sf \
                  -H "Authorization: Bearer $GH_TOKEN" \
                  "https://api.github.com/repos/${{ github.repository }}/deployments/$DEPLOY_ID/statuses" \
                  | python3 -c "
        import json,sys
        statuses = json.load(sys.stdin)
        for s in statuses:
            if s.get('state') == 'success' and s.get('environment_url'):
                print(s['environment_url']); break
        " 2>/dev/null || true)
                if [ -n "$PREVIEW_URL" ]; then
                  echo "Found preview deployment: $PREVIEW_URL"
                  # Append bypass secret if provided (e.g. Vercel protection bypass)
                  if [ -n "${{ inputs.preview-bypass-secret }}" ]; then
                    PREVIEW_URL="${PREVIEW_URL}?x-vercel-protection-bypass=${{ inputs.preview-bypass-secret }}"
                    echo "Bypass secret applied"
                  fi
                  SITE_URL="$PREVIEW_URL"
                  break
                fi
              fi
              echo "Attempt $i/30: preview not ready, waiting 10s..."
              sleep 10
            done
            if [ -z "$PREVIEW_URL" ]; then
              echo "WARNING: No preview deployment found after 5 min, falling back to site-url"
            fi
          fi
        fi

        echo "Testing against: $SITE_URL"
        echo "url=$SITE_URL" >> $GITHUB_OUTPUT

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Run visual regression tests
      shell: bash
      env:
        VR_API_KEY: ${{ inputs.api-key }}
        VR_PROJECT_ID: ${{ inputs.project-id }}
        VR_PAGES_JSON: ${{ inputs.pages }}
      run: |
        ARGS=(
          --suite "${{ inputs.suite }}"
          --base-url "${{ steps.resolve-url.outputs.url }}"
          --backend-url "${{ inputs.backend-url }}"
          --threshold "${{ inputs.threshold }}"
        )

        if [ "${{ inputs.detect-noise }}" = "true" ]; then
          ARGS+=(--detect-noise)
        fi

        if [ -n "$VR_PAGES_JSON" ]; then
          echo "$VR_PAGES_JSON" > /tmp/vr_pages_inline.json
          ARGS+=(--pages-file /tmp/vr_pages_inline.json)
        elif [ -n "${{ inputs.config-file }}" ]; then
          ARGS+=(--config-file "${{ inputs.config-file }}")
        fi

        python "${{ github.action_path }}/run_visual_tests.py" "${ARGS[@]}"

    - name: Upload visual report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: visual-regression-report
        path: visual-report.json
        if-no-files-found: ignore
